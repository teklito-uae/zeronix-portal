name: Build and Deploy to Production

on:
  push:
    branches: ["master"]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build Frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, iconv, mysql, zip, pdo_mysql
          tools: composer:v2

      - name: Build Backend
        run: |
          cd backend
          composer install --no-dev --optimize-autoloader
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache

      - name: Prepare Deploy Folder
        run: |
          mkdir -p deploy/backend
          
          # 1. Copy Frontend Build
          cp -r frontend/dist/* deploy/
          
          # 2. Copy Backend Files
          cp -r backend/* deploy/backend/
          
          # 3. Inject .env from Secrets
          echo "${{ secrets.PRODUCTION_ENV }}" > deploy/backend/.env
          
          # 4. Create Laravel storage folders
          mkdir -p deploy/backend/storage/app/public
          mkdir -p deploy/backend/storage/framework/{cache,sessions,views}
          mkdir -p deploy/backend/storage/logs
          chmod -R 775 deploy/backend/storage
          
          # 5. Create root .htaccess for routing
          cat > deploy/.htaccess <<EOF
          <IfModule mod_rewrite.c>
            RewriteEngine On
            
            # Handle API requests
            RewriteRule ^api/(.*)$ backend/public/index.php [L]
            
            # Handle SPA routing - if file/dir doesn't exist, send to index.html
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule ^ index.html [L]
          </IfModule>
          EOF
          
          # 6. Remove .gitignore files inside deploy to ensure everything is pushed
          find deploy -name ".gitignore" -type f -delete

      - name: Deploy to Production Branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: deploy
          branch: production
          clean: true
          single-commit: true

      - name: Trigger Hostinger Deployment
        run: |
          curl -X POST -H "Content-Type: application/json" -d '{}' "https://webhooks.hostinger.com/deploy/09e7a9a2bf52947fe251104e2ba1be9c"


